; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = rakwireless/boards
default_envs = sensor

[common_env_settings]
platform = nordicnrf52
board = rak4630
framework = arduino
build_src_filter = +<*> -<../examples/> -<../test/> +<../rakwireless/variants/rak4630/>
lib_deps =
  beegee-tokyo/SX126x-Arduino@^2.0.32
  adafruit/Adafruit BME680 Library@^2.0.5
  adafruit/Adafruit Unified Sensor@^1.1.15
  asukiaaa/MPU9250_asukiaaa@^1.5.13
  adafruit/Adafruit GFX Library@^1.11.9
  adafruit/Adafruit SSD1306@^2.5.7
lib_ldf_mode = deep
build_flags =
  -I rakwireless/variants/rak4630
  -I lib/OLEDDisplay
  -DNETWORK_ID=1
  -DTEST_MODE_AWAKE ; All nodes stay awake

[env:sensor]
extends = common_env_settings
build_flags =
  ${common_env_settings.build_flags}
  -DDEVICE_ID=1
  -DDESTINATION_ID=3
  -DSENSOR_NODE ; Enables the sensor-role sending loop in main.cpp

[env:sender]
extends = env:sensor ; legacy alias

[env:meshnode2]
extends = common_env_settings
build_flags =
  ${common_env_settings.build_flags}
  -DDEVICE_ID=2

[env:node2]
extends = env:meshnode2 ; legacy alias

[env:meshnode3]
extends = common_env_settings
build_flags =
  ${common_env_settings.build_flags}
  -DDEVICE_ID=3
  -UTEST_MODE_AWAKE
  -DMESH_WAKE_CYCLE_MS=10000
  -DMESH_WAKE_WINDOW_MS=3000
  -DMESH_PENDING_BEACON_ENABLED=1
  -DMESH_PENDING_LISTEN_MS=3000
  -DMESH_RX_DUTY_CYCLE_ENABLED=1
  -DMESH_RX_DUTY_CYCLE_RX_MS=64
  -DMESH_RX_DUTY_CYCLE_SLEEP_MS=256
  -DMCU_IDLE_SLEEP_ENABLED=1
  -DMCU_IDLE_SLEEP_MAX_MS=50

[env:node3]
extends = env:meshnode3 ; legacy alias

[env:meshnode4]
extends = common_env_settings
build_flags =
  ${common_env_settings.build_flags}
  -DDEVICE_ID=4

[env:node4]
extends = env:meshnode4 ; legacy alias

[env:sleep_mode_test]
extends = common_env_settings
