; ==============================================================================
; METRICS BUILDS
; ==============================================================================
; These environments layer NodeMetrics.h on top of the fullsleep_sync builds.
; All METRIC lines are printed to Serial every METRICS_EPOCH_MS (60 s default).
;
; Quick-start:
;   pio run -e sensor_metrics --target upload
;   pio device monitor | grep "^METRIC"
;
; Overload metrics captured per epoch:
;   queue_peak / queue_avg / tx_pressure_pct  -- TX queue saturation
;   fwd_drops / dup_drops                     -- packet loss
;   cad_busy                                  -- channel utilisation
;   sc_retries                                -- sync stability
;   rssi_avg / rssi_min / rssi_max / snr_*    -- link quality
;   duty_cycle_pct / radio_on_est_ms          -- energy proxy
;   overload_score (0-100) / overload_level   -- composite index
;
; Sensor TX interval is halved (10 s) vs production (20 s) so congestion
; builds faster during load tests.
; ==============================================================================

[metrics_fullsleep_sync_common]
; Shared flags that sit on top of fullsleep_sync_common for every metrics env.
build_flags =
  ${fullsleep_sync_common.build_flags}
  -DMESH_METRICS_ENABLED=1
  -DMESH_EVENT_LOGS=1
  -DSERIAL_DEBUG_INTERVAL_MS=120000
  -DMETRICS_EPOCH_MS=60000
  -DMETRICS_QUEUE_SAMPLE_MS=500

[env:sensor_metrics]
extends = common_env_settings
build_flags =
  ${common_env_settings.build_flags}
  ${metrics_fullsleep_sync_common.build_flags}
  -DDEVICE_ID=1
  -DDESTINATION_ID=65535
  -DSENSOR_NODE
